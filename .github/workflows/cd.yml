name: cd

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: hammadlearningapp
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  PROJECT_PATH: ./src/UpskillTracker/UpskillTracker.csproj
  PUBLISH_PATH: ./publish
  PACKAGE_PATH: ./upskilltracker.zip

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_PATH }}

      - name: Package deployment artifacts
        run: |
          cd ${{ env.PUBLISH_PATH }}
          zip -r ${{ github.workspace }}/upskilltracker.zip .

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --src-path ${{ env.PACKAGE_PATH }} \
            --type zip \
            --clean true \
            --restart true \
            --async true \
            --track-status false \
            --timeout 180000
