name: cd

on:
  workflow_dispatch:
    inputs:
      deployInfra:
        description: Force infrastructure deployment before app deployment
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AZURE_CUSTOM_HOSTNAME: skilling.hammadaslam.com
  AZURE_APPINSIGHTS_NAME: appi-personal-learning-tn33sb
  AZURE_LOCATION: eastus2
  AZURE_POSTGRES_LOCATION: centralus
  AZURE_LOG_ANALYTICS_NAME: log-personal-learning-tn33sb
  AZURE_RESOURCE_GROUP: hammadlearningapp
  AZURE_APP_SERVICE_PLAN_NAME: plan-personal-learning-tn33sb
  AZURE_APP_SERVICE_PLAN_SKU: P0v3
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZD_ENVIRONMENT_NAME: personal-learning
  PROJECT_PATH: ./src/UpskillTracker/UpskillTracker.csproj
  PUBLISH_PATH: ./publish
  PACKAGE_PATH: ./upskilltracker.zip
  COPILOT_DEFAULT_MODEL: gpt-5
  POSTGRES_ADMIN_LOGIN: pgbootstrap

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect infrastructure changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
              - 'azure.yaml'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --runtime linux-x64 --self-contained false --output ${{ env.PUBLISH_PATH }}

      - name: Package deployment artifacts
        run: |
          cd ${{ env.PUBLISH_PATH }}
          zip -r ${{ github.workspace }}/upskilltracker.zip .

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Deploy infrastructure
        id: infra
        run: |
          deployment_output=$(az deployment group create \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name infra-${{ github.run_id }} \
            --template-file infra/resources.bicep \
            --parameters accessPin=${{ secrets.APP_ACCESS_PIN }} \
                         gitHubOAuthClientId=${{ secrets.APP_GH_OAUTH_CLIENT_ID }} \
                         gitHubOAuthClientSecret=${{ secrets.APP_GH_OAUTH_CLIENT_SECRET }} \
                         youTubeApiKey=${{ secrets.APP_YOUTUBE_API_KEY }} \
                         postgresAdminLogin=${{ env.POSTGRES_ADMIN_LOGIN }} \
                         postgresAdminPassword=${{ secrets.APP_POSTGRES_ADMIN_PASSWORD }} \
                         copilotDefaultModel=${{ env.COPILOT_DEFAULT_MODEL }} \
            --parameters location=${{ env.AZURE_LOCATION }} \
                         postgresLocation=${{ env.AZURE_POSTGRES_LOCATION }} \
                         appInsightsName=${{ env.AZURE_APPINSIGHTS_NAME }} \
                         appServicePlanName=${{ env.AZURE_APP_SERVICE_PLAN_NAME }} \
                         appServicePlanSku=${{ env.AZURE_APP_SERVICE_PLAN_SKU }} \
                         webAppName=${{ env.AZURE_WEBAPP_NAME }} \
                         customHostname=${{ env.AZURE_CUSTOM_HOSTNAME }} \
                         logAnalyticsWorkspaceName=${{ env.AZURE_LOG_ANALYTICS_NAME }})

          echo "$deployment_output" > deployment-output.json
          postgres_server_name=$(jq -r '.properties.outputs.postgresServerName.value' deployment-output.json)
          postgres_database_name=$(jq -r '.properties.outputs.postgresDatabaseName.value' deployment-output.json)

          echo "POSTGRES_SERVER_NAME=$postgres_server_name" >> $GITHUB_ENV
          echo "POSTGRES_DATABASE_NAME=$postgres_database_name" >> $GITHUB_ENV

      - name: Configure PostgreSQL Entra admin
        run: |
          webapp_principal_id=$(az webapp identity show \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --query principalId -o tsv)
          webapp_principal_name="${{ env.AZURE_WEBAPP_NAME }}"

          existing_admin_object_id=$(az postgres flexible-server microsoft-entra-admin list \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server-name ${{ env.POSTGRES_SERVER_NAME }} \
            --query "[0].objectId" -o tsv)

          if [ -n "$existing_admin_object_id" ] && [ "$existing_admin_object_id" != "$webapp_principal_id" ]; then
            az postgres flexible-server microsoft-entra-admin delete \
              --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --server-name ${{ env.POSTGRES_SERVER_NAME }} \
              --object-id "$existing_admin_object_id" \
              --yes
          fi

          if [ "$existing_admin_object_id" != "$webapp_principal_id" ]; then
            az postgres flexible-server microsoft-entra-admin create \
              --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --server-name ${{ env.POSTGRES_SERVER_NAME }} \
              --display-name "$webapp_principal_name" \
              --object-id "$webapp_principal_id" \
              --type ServicePrincipal
          else
            echo "PostgreSQL Microsoft Entra admin already matches the web app identity."
          fi

          az postgres flexible-server microsoft-entra-admin show \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server-name ${{ env.POSTGRES_SERVER_NAME }} \
            --object-id "$webapp_principal_id"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --src-path ${{ env.PACKAGE_PATH }} \
            --type zip \
            --clean true \
            --restart true \
            --async true \
            --track-status false \
            --timeout 180000
