name: cd

on:
  workflow_dispatch:
    inputs:
      deployInfra:
        description: Force infrastructure deployment before app deployment
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AZURE_CUSTOM_HOSTNAME: skilling.hammadaslam.com
  AZURE_LOCATION: eastus2
  AZURE_RESOURCE_GROUP: hammadlearningapp
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  AZD_ENVIRONMENT_NAME: personal-learning
  PROJECT_PATH: ./src/UpskillTracker/UpskillTracker.csproj
  PUBLISH_PATH: ./publish
  PACKAGE_PATH: ./upskilltracker.zip

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect infrastructure changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            infra:
              - 'infra/**'
              - 'azure.yaml'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ${{ env.PUBLISH_PATH }}

      - name: Package deployment artifacts
        run: |
          cd ${{ env.PUBLISH_PATH }}
          zip -r ${{ github.workspace }}/upskilltracker.zip .

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Deploy infrastructure
        if: steps.changes.outputs.infra == 'true' || github.event.inputs.deployInfra == 'true'
        run: |
          az deployment sub create \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --location ${{ env.AZURE_LOCATION }} \
            --name infra-${{ github.run_id }} \
            --template-file infra/main.bicep \
            --parameters environmentName=${{ env.AZD_ENVIRONMENT_NAME }} \
                         location=${{ env.AZURE_LOCATION }} \
                         resourceGroupName=${{ env.AZURE_RESOURCE_GROUP }} \
                         webAppName=${{ env.AZURE_WEBAPP_NAME }} \
                         customHostname=${{ env.AZURE_CUSTOM_HOSTNAME }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --src-path ${{ env.PACKAGE_PATH }} \
            --type zip \
            --clean true \
            --restart true \
            --async true \
            --track-status false \
            --timeout 180000
