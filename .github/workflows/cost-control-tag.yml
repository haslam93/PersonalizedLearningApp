name: cost-control-tag

on:
  schedule:
    # Every Monday at 06:00 UTC. Re-applying the tag weekly keeps the
    # CostControl=Ignore exemption window from ever reaching its 2-week expiry.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: hammadlearningapp
  COST_CONTROL_TAG_NAME: CostControl
  COST_CONTROL_TAG_VALUE: Ignore

jobs:
  refresh-cost-control-tag:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Refresh CostControl tag to reset the exemption window
        env:
          # Number of times to retry a tag update while a resource is still
          # provisioning, and how long (in seconds) to wait between attempts.
          TAG_UPDATE_MAX_ATTEMPTS: '5'
          TAG_UPDATE_RETRY_DELAY: '30'
        run: |
          set -euo pipefail

          subscription_id="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group="${{ env.AZURE_RESOURCE_GROUP }}"
          tag_name="${{ env.COST_CONTROL_TAG_NAME }}"
          tag_value="${{ env.COST_CONTROL_TAG_VALUE }}"
          max_attempts="${TAG_UPDATE_MAX_ATTEMPTS}"
          retry_delay="${TAG_UPDATE_RETRY_DELAY}"

          az account set --subscription "$subscription_id"

          # Run an "az tag update" call, retrying when Azure reports that the
          # resource is still provisioning. Such conflicts are transient: the
          # update simply cannot proceed until the resource reaches the
          # "Succeeded" state. We wait and retry a few times instead of letting
          # the whole workflow fail on a temporary race condition.
          tag_update_with_retry() {
            local resource_id="$1"
            local operation="$2"
            local attempt=1

            while true; do
              local output=""
              if output=$(az tag update --resource-id "$resource_id" --operation "$operation" --tags "${tag_name}=${tag_value}" 2>&1); then
                return 0
              fi

              # Only retry the "still provisioning" conflict. Surface any other
              # failure so genuine problems are not silently swallowed.
              if echo "$output" | grep -qiE "provisioning state is not Succeeded|Conflict"; then
                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::warning::Skipping ${operation} on ${resource_id}: still provisioning after ${max_attempts} attempt(s)."
                  echo "$output"
                  return 1
                fi
                echo "Resource is still provisioning; waiting ${retry_delay}s before retry (attempt ${attempt}/${max_attempts})."
                attempt=$((attempt + 1))
                sleep "$retry_delay"
                continue
              fi

              echo "::error::Failed to ${operation} tag on ${resource_id}."
              echo "$output"
              return 2
            done
          }

          # Target the resource group itself plus every resource inside it so the
          # exemption applies broadly. Removing the tag and re-adding it updates
          # its last-modified timestamp, which restarts the 2-week cost-control timer.
          resource_group_id=$(az group show --name "$resource_group" --query id -o tsv)

          mapfile -t resource_ids < <(az resource list --resource-group "$resource_group" --query "[].id" -o tsv)

          target_ids=("$resource_group_id" ${resource_ids[@]+"${resource_ids[@]}"})

          refreshed=0
          skipped=0
          for resource_id in "${target_ids[@]}"; do
            echo "Refreshing ${tag_name}=${tag_value} on ${resource_id}"

            status=0
            tag_update_with_retry "$resource_id" Delete || status=$?
            if [ "$status" -eq 0 ]; then
              tag_update_with_retry "$resource_id" Merge || status=$?
            fi

            case "$status" in
              0)
                refreshed=$((refreshed + 1))
                ;;
              1)
                # Transient provisioning conflict that outlasted our retries.
                # Skip this resource so a single busy resource does not fail the run.
                skipped=$((skipped + 1))
                ;;
              *)
                echo "::error::Unexpected error refreshing ${resource_id}."
                exit 1
                ;;
            esac
          done

          echo "CostControl tag refreshed on ${refreshed} resource(s); ${skipped} skipped while provisioning."
